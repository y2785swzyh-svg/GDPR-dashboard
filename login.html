<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GDPR Risk Assessment Dashboard — Login</title>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 420px;
      padding: 40px;
    }
    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-header h1 {
      font-size: 24px;
      color: #222;
      margin-bottom: 8px;
    }
    .login-header p {
      color: #666;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      transition: all 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    .turnstile-wrapper {
      margin-bottom: 24px;
      display: flex;
      justify-content: center;
    }
    .btn-login {
      width: 100%;
      padding: 12px 20px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 12px;
    }
    .btn-login:hover {
      background: #5568d3;
    }
    .btn-login:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .error {
      background: #ffebee;
      color: #c62828;
      padding: 12px 14px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }
    .error.show {
      display: block;
    }
    .loading {
      display: none;
      text-align: center;
      font-size: 13px;
      color: #666;
      margin-top: 20px;
    }
    .loading.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>GDPR Risk Assessment</h1>
      <p>Dashboard Valutazione Rischi</p>
    </div>

    <form id="loginForm">
      <div class="error" id="errorMsg"></div>

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autofocus>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>

      <div class="turnstile-wrapper">
        <div class="cf-turnstile" data-sitekey="SITEKEY_HERE"></div>
      </div>

      <button type="submit" class="btn-login" id="btnLogin">Accedi</button>
      <div class="loading" id="loading">⏳ Verifica in corso...</div>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const token = document.querySelector('[name="cf-turnstile-response"]').value;
      const errorMsg = document.getElementById('errorMsg');
      const btnLogin = document.getElementById('btnLogin');
      const loading = document.getElementById('loading');

      if (!token) {
        errorMsg.textContent = 'Completa la verifica Cloudflare.';
        errorMsg.classList.add('show');
        return;
      }

      btnLogin.disabled = true;
      loading.classList.add('show');
      errorMsg.classList.remove('show');

      try {
        const res = await fetch('/.netlify/functions/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, token })
        });
        const data = await res.json();

        if (res.ok && data.token) {
          localStorage.setItem('gdpr_auth_token', data.token);
          window.location.href = '/dashboard.html';
        } else {
          errorMsg.textContent = data.error || 'Login fallito. Verifica credenziali.';
          errorMsg.classList.add('show');
          btnLogin.disabled = false;
          loading.classList.remove('show');
          turnstile.reset();
        }
      } catch (err) {
        errorMsg.textContent = 'Errore di connessione: ' + err.message;
        errorMsg.classList.add('show');
        btnLogin.disabled = false;
        loading.classList.remove('show');
      }
    });
  </script>
</body>
</html>
